version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace_user
      POSTGRES_PASSWORD: marketplace_password_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - marketplace

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://marketplace_user:marketplace_password_dev@postgres:5432/marketplace
      JWT_SECRET: dev-secret-key
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - postgres
    networks:
      - marketplace
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    networks:
      - marketplace

volumes:
  postgres_data:

networks:
  marketplace:
    driver: bridge
