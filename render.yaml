services:
  - type: web
    name: marketplace-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://marketplace-frontend.onrender.com

  - type: web
    name: marketplace-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.frontend
    envVars:
      - key: VITE_API_URL
        value: https://marketplace-backend.onrender.com

databases:
  - name: marketplace-db
    dbName: marketplace
    user: marketplace_user
