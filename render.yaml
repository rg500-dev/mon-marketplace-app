services:
  - type: web
    name: marketplace-backend
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://marketplace-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          property: connectionString

  - type: web
    name: marketplace-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://marketplace-backend.onrender.com

databases:
  - name: marketplace-db
    plan: free
    databaseName: marketplace
    user: marketplace_user
    ipWhitelist: []
