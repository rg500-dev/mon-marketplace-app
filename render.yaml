8services:
  - type: web
    name: marketplace-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          pr8operty: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://marketplace-frontend.onrender.com

  - type: web
    name: marketplace-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://marketplace-backend.onrender.com

databases:
  - name: marketplace-db
    dbName: marketplace
    user: marketplace_user
